<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>my webpage</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="your-pfp.png">

<!-- FONT IMPORT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

<style>
  /* Cursor */
  body {
    cursor: url('robloxoldcursor.webp'), auto;
    margin: 0;
    font-family: 'Google Sans Code', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    position: relative;
    overflow: hidden;
    background: black;
  }

  /* ✦ stars */
  .star {
    position: fixed;
    color: white;
    pointer-events: none;
    user-select: none;
    opacity: 0.7;
  }

  .container {
    text-align: center;
    z-index: 2;
    position: relative;
  }

  img.profile {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
  }

  h1 {
    margin: 5px;
  }

  p {
    opacity: 0.7;
  }

  .buttons {
    margin-top: 15px;
  }

  /* Icon buttons */
  .buttons a {
    display: inline-block;
    margin: 8px;
    text-decoration: none;
  }

  .buttons a img {
    width: 60px;
    height: 60px;
    display: block;
    transition: transform 0.3s;
  }

  .buttons a img:hover {
    transform: scale(1.1);
  }

  /* Mute/unmute button */
  #muteBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white; /* Changed to white */
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
    z-index: 2;
    padding: 6px;
    border: none;
  }

  #muteBtn img {
    width: 24px;
    height: 24px;
    display: block;
  }

  /* Full-screen overlay for click-to-view */
  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 2em;
    z-index: 3;
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
</style>
</head>
<body>

<!-- click-to-view overlay -->
<div id="overlay">click anywhere to view</div>

<!-- Mute/unmute button with image -->
<button id="muteBtn">
  <img id="muteIcon" src="unmute.png" alt="mute">
</button>

<div class="container">
  <img class="profile" src="your-pfp.gif" alt="pfp">
  <h1>cry</h1>
  <p>:P</p>

  <div class="buttons">
    <a href="https://steamcommunity.com/id/cry_tals" target="_blank">
      <img src="steam.webp" alt="steam">
    </a>
    <a href="https://discord.com/users/955250582078238730" target="_blank">
      <img src="discord.webp" alt="discord">
    </a>
    <a href="https://www.tiktok.com/@vernacularism" target="_blank">
      <img src="tiktok.webp" alt="tiktok">
    </a>
    <a href="https://www.roblox.com/users/679387671/profile" target="_blank">
      <img src="roblox.webp" alt="roblox">
    </a>
  </div>
</div>

<audio id="music" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const overlay = document.getElementById("overlay");
const music = document.getElementById("music");
const btn = document.getElementById("muteBtn");
const muteIcon = document.getElementById("muteIcon");
let musicPlaying = false;

// Fade audio function
function fadeAudio(audio, from, to, duration, callback) {
  const stepTime = 20;
  const steps = duration / stepTime;
  let currentStep = 0;
  audio.volume = from;

  const step = () => {
    currentStep++;
    const vol = from + (to - from) * (currentStep / steps);
    audio.volume = Math.min(Math.max(vol, 0), 1);
    if (currentStep < steps) {
      setTimeout(step, stepTime);
    } else if (callback) callback();
  };
  step();
}

// Overlay click handler
overlay.addEventListener("click", () => {
  overlay.style.opacity = "0";
  setTimeout(() => overlay.style.display = "none", 500);

  if (!musicPlaying) {
    music.muted = false;
    music.play().then(() => fadeAudio(music, 0, 1, 500))
      .catch(err => console.log("Music play failed:", err));
    musicPlaying = true;
    muteIcon.src = "unmute.png";
  }
}, { once: true });

// Mute/unmute button with fade lock
let fadeInProgress = false;

btn.onclick = () => {
  if (fadeInProgress) return;
  fadeInProgress = true;

  if (music.muted) {
    music.muted = false;
    fadeAudio(music, 0, 1, 500, () => { fadeInProgress = false; });
    muteIcon.src = "unmute.png";
  } else {
    fadeAudio(music, 1, 0, 500, () => {
      music.muted = true;
      fadeInProgress = false;
    });
    muteIcon.src = "mute.png";
  }
};

// ✦ generate random stars
function createStars(count) {
  const stars = [];
  const minDistance = 40;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    star.textContent = '✦';
    let tries = 0;
    let x, y;
    do {
      x = Math.random() * window.innerWidth;
      y = Math.random() * window.innerHeight;
      tries++;
    } while (stars.some(s => Math.hypot(s.x - x, s.y - y) < minDistance) && tries < 100);
    star.style.left = `${x}px`;
    star.style.top = `${y}px`;
    const size = 8 + Math.random() * 16;
    star.style.fontSize = `${size}px`;
    star.style.opacity = 0.5 + Math.random() * 0.5;
    stars.push({x, y});
    document.body.appendChild(star);
  }
}

createStars(30);
</script>

</body>
</html>
